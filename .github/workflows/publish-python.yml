name: Publish traderdaddy (Python) to PyPI

# Publishes the Python SDK in python/ via PyPI Trusted Publishing (OIDC) — no
# stored tokens. Tag a release as `py-vX.Y.Z` (matching python/pyproject.toml's
# version) to ship to PyPI. Use the manual "Run workflow" button to dry-run to
# TestPyPI without tagging.
#
# One-time PyPI setup (per environment): on the project's Publishing page add a
# GitHub trusted publisher —
#   owner: mphinance
#   repo: traderdaddy-sdk
#   workflow: publish-python.yml
#   environment: pypi   (and `testpypi` on test.pypi.org for dry runs)

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

defaults:
  run:
    working-directory: python

jobs:
  build:
    name: Build & validate distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pkg_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#py-v}"
          echo "package=$pkg_version tag=$tag_version"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $pkg_version"
            exit 1
          fi

      - name: Run tests
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest -q

      - name: Build sdist + wheel
        run: python -m build

      - name: twine check
        run: python -m twine check dist/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/

  publish-testpypi:
    name: Publish to TestPyPI (dry run)
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
